<!DOCTYPE html>
<html>
<head>
  <title>Nlogonia</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: cornsilk;
    }

    #plane {
      width: 400px;
      height: 400px;
      border: 1px solid black;
      margin: 20px auto;
      position: relative;
      background: #eee;
    }

    .axis {
      position: absolute;
      background: black;
    }

    #xAxis {
      top: 200px;
      width: 100%;
      height: 1px;
    }

    #yAxis {
      left: 200px;
      height: 100%;
      width: 1px;
    }

    .point {
      position: absolute;
      width: 10px;
      height: 10px;
      background: red;
    }

    input, button {
      padding: 8px;
      margin: 5px;
    }

    table {
      margin: auto;
      border-collapse: collapse;
    }

    td, th {
      border: 1px solid black;
      padding: 8px;
    }
  </style>
</head>

<body>

<h1>Nlogonia Locator</h1>

<h3>Input</h3>
<p>Division Point:</p>
<input id="x0" placeholder="x0">
<input id="y0" placeholder="y0">

<p>House:</p>
<input id="x" placeholder="x">
<input id="y" placeholder="y">

<br>
<button onclick="plot()">Check</button>

<h3 id="result">Output: </h3>

<h3>Table</h3>
<table>
<tr><th>Input</th><th>Output</th></tr>
<tr>
<td id="in1">-</td>
<td id="out1">-</td>
</tr>
</table>

<div id="plane">
  <div id="xAxis" class="axis"></div>
  <div id="yAxis" class="axis"></div>
</div>

<script>
function plot() {
  let x0 = Number(document.getElementById("x0").value);
  let y0 = Number(document.getElementById("y0").value);
  let x = Number(document.getElementById("x").value);
  let y = Number(document.getElementById("y").value);

  document.getElementById("in1").innerHTML = x0 + " " + y0 + " " + x + " " + y;

  let result = "";

  if (x == x0 || y == y0) {
    result = "divisa";
  }
  else if (x > x0 && y > y0) {
    result = "NE";
  }
  else if (x < x0 && y > y0) {
    result = "NO";
  }
  else if (x > x0 && y < y0) {
    result = "SE";
  }
  else {
    result = "SO";
  }

  document.getElementById("result").innerHTML = "Output: " + result;
  document.getElementById("out1").innerHTML = result;

  let old = document.querySelector(".point");
  if (old) old.remove();

  let point = document.createElement("div");
  point.className = "point";

  point.style.left = (200 + (x - x0) * 10 - 5) + "px";
  point.style.top = (200 - (y - y0) * 10 - 5) + "px";

  document.getElementById("plane").appendChild(point);
}
</script>

</body>
</html>
